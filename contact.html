    <h1>Contact Us Form</h1>

    <h2>Hello, welcome to the contact info</h2>

    <h2>Please fill out the form below to enter the following information</h2>


    <form id="contactForm">
    <label for="name">Please enter your name</label>
    <input type="text" id="name" name="name">

    <label for="email">Please enter your email</label>
    <input type="text" id="email" name="email">

    <label for="phonenumber">Please enter your phone number</label>
    <input type="text" id="phonenumber" name="phonenumber">

    <label for="event">Please enter the date of the event</label>
    <input type="text" id="event" name="event">

    <label for="message">Please enter your message</label>
    <textarea id="message" name="message"></textarea>


    <div class="button-row">
        
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
    </div>
    </form>
